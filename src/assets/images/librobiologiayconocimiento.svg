<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3d1f"/>
      <stop offset="100%" style="stop-color:#1b6b3a"/>
    </linearGradient>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a3d1f;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#0a3d1f;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- DNA helix left side -->
  <g opacity="0.25" transform="translate(200, 225)">
    <path d="M-50,-180 C-10,-140 30,-100 50,-60 C30,-20 -10,20 -50,60 C-10,100 30,140 50,180" fill="none" stroke="#66bb6a" stroke-width="3.5"/>
    <path d="M50,-180 C10,-140 -30,-100 -50,-60 C-10,-20 50,20 50,60 C10,100 -30,140 50,180" fill="none" stroke="#a5d6a7" stroke-width="3.5"/>
    <!-- Base pairs -->
    <line x1="-20" y1="-150" x2="20" y2="-150" stroke="#c8e6c9" stroke-width="2"/>
    <line x1="-38" y1="-110" x2="10" y2="-110" stroke="#c8e6c9" stroke-width="2"/>
    <line x1="-48" y1="-70" x2="-10" y2="-70" stroke="#c8e6c9" stroke-width="2"/>
    <line x1="-38" y1="-30" x2="10" y2="-30" stroke="#c8e6c9" stroke-width="2"/>
    <line x1="-20" y1="10" x2="20" y2="10" stroke="#c8e6c9" stroke-width="2"/>
    <line x1="5" y1="50" x2="45" y2="50" stroke="#c8e6c9" stroke-width="2"/>
    <line x1="-5" y1="90" x2="45" y2="90" stroke="#c8e6c9" stroke-width="2"/>
    <line x1="-20" y1="130" x2="20" y2="130" stroke="#c8e6c9" stroke-width="2"/>
    <!-- Cell -->
    <circle cx="0" cy="-205" r="28" fill="#a5d6a7" opacity="0.25"/>
    <circle cx="0" cy="-205" r="16" fill="#a5d6a7" opacity="0.35"/>
    <circle cx="0" cy="-205" r="7" fill="#66bb6a" opacity="0.6"/>
  </g>

  <rect x="340" y="0" width="460" height="450" fill="url(#fade)"/>
  <rect x="14" y="14" width="772" height="422" fill="none" stroke="#a5d6a7" stroke-width="1.5" opacity="0.5"/>

  <text x="510" y="90" font-family="Georgia,'Times New Roman',serif" font-size="13" fill="#81c784" text-anchor="middle" letter-spacing="5" opacity="0.85">BIOLOGÍA · COGNICIÓN · EPISTEMOLOGÍA</text>

  <text x="510" y="195" font-family="Georgia,'Times New Roman',serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">BIOLOGÍA</text>
  <text x="510" y="245" font-family="Georgia,'Times New Roman',serif" font-size="28" fill="#c8e6c9" text-anchor="middle" letter-spacing="6">Y CONOCIMIENTO</text>

  <line x1="360" y1="272" x2="660" y2="272" stroke="#a5d6a7" stroke-width="1.5" opacity="0.7"/>

  <text x="510" y="310" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#a5d6a7" text-anchor="middle">Jean Piaget</text>
  <text x="510" y="340" font-family="Georgia,'Times New Roman',serif" font-size="13" fill="#81c784" text-anchor="middle" opacity="0.7">Epistemología Genética</text>

  <text x="510" y="415" font-family="Georgia,'Times New Roman',serif" font-size="11" fill="#a5d6a7" text-anchor="middle" letter-spacing="4" opacity="0.5">SISTEMAS AUTOORGANIZADOS</text>
</svg>
