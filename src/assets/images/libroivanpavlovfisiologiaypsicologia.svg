<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b0a14"/>
      <stop offset="100%" style="stop-color:#6d1526"/>
    </linearGradient>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b0a14;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#3b0a14;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Corner ornaments -->
  <g stroke="#ffd54f" stroke-width="2" fill="none" opacity="0.45">
    <path d="M28,28 L28,58 M28,28 L58,28"/>
    <path d="M772,28 L772,58 M772,28 L742,28"/>
    <path d="M28,422 L28,392 M28,422 L58,422"/>
    <path d="M772,422 L772,392 M772,422 L742,422"/>
  </g>

  <!-- Neural wave decoration left side -->
  <g opacity="0.22" transform="translate(0, 225)">
    <path d="M30,0 C55,-40 80,40 105,0 C130,-40 155,40 180,0 C205,-40 230,40 255,0 C280,-40 305,40 330,0 C355,-40 380,0 400,0" fill="none" stroke="#ff8a80" stroke-width="3"/>
    <path d="M30,-50 C55,-90 80,-10 105,-50 C130,-90 155,-10 180,-50 C205,-90 230,-10 255,-50 C280,-90 305,-10 330,-50 C355,-90 380,-50 400,-50" fill="none" stroke="#ffd54f" stroke-width="2.5"/>
    <path d="M30,50 C55,10 80,90 105,50 C130,10 155,90 180,50 C205,10 230,90 255,50 C280,10 305,90 330,50 C355,10 380,50 400,50" fill="none" stroke="#ff8a80" stroke-width="2"/>
    <!-- Neural nodes -->
    <circle cx="105" cy="0" r="7" fill="#ffd54f" opacity="0.8"/>
    <circle cx="180" cy="0" r="7" fill="#ffd54f" opacity="0.8"/>
    <circle cx="255" cy="0" r="7" fill="#ffd54f" opacity="0.8"/>
    <circle cx="330" cy="0" r="7" fill="#ffd54f" opacity="0.8"/>
    <!-- Dendrites -->
    <line x1="180" y1="-7" x2="180" y2="-80" stroke="#ffd54f" stroke-width="2"/>
    <line x1="180" y1="-80" x2="155" y2="-110" stroke="#ffd54f" stroke-width="1.5"/>
    <line x1="180" y1="-80" x2="205" y2="-110" stroke="#ffd54f" stroke-width="1.5"/>
    <line x1="180" y1="-80" x2="180" y2="-115" stroke="#ffd54f" stroke-width="1.5"/>
    <circle cx="180" cy="-80" r="7" fill="#ffd54f" opacity="0.7"/>
    <circle cx="255" cy="7" x2="255" y2="80" stroke="#ffd54f" stroke-width="2"/>
    <line x1="255" y1="7" x2="255" y2="80" stroke="#ffd54f" stroke-width="2"/>
    <line x1="255" y1="80" x2="230" y2="108" stroke="#ffd54f" stroke-width="1.5"/>
    <line x1="255" y1="80" x2="280" y2="108" stroke="#ffd54f" stroke-width="1.5"/>
    <circle cx="255" cy="80" r="7" fill="#ffd54f" opacity="0.7"/>
  </g>

  <rect x="340" y="0" width="460" height="450" fill="url(#fade)"/>
  <rect x="14" y="14" width="772" height="422" fill="none" stroke="#ffd54f" stroke-width="1.5" opacity="0.45"/>

  <text x="510" y="90" font-family="Georgia,'Times New Roman',serif" font-size="13" fill="#ffd54f" text-anchor="middle" letter-spacing="5" opacity="0.8">FISIOLOGÍA · PSICOLOGÍA · REFLEJOS</text>

  <text x="510" y="170" font-family="Georgia,'Times New Roman',serif" font-size="16" fill="#ffcc80" text-anchor="middle" letter-spacing="4">OBRAS COMPLETAS</text>
  <text x="510" y="235" font-family="Georgia,'Times New Roman',serif" font-size="46" font-weight="bold" fill="white" text-anchor="middle">FISIOLOGÍA</text>
  <text x="510" y="278" font-family="Georgia,'Times New Roman',serif" font-size="30" fill="#ffcc80" text-anchor="middle" letter-spacing="3">Y PSICOLOGÍA</text>

  <line x1="360" y1="300" x2="660" y2="300" stroke="#ffd54f" stroke-width="1.5" opacity="0.7"/>

  <text x="510" y="338" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#ffd54f" text-anchor="middle">Iván P. Pávlov</text>
  <text x="510" y="366" font-family="Georgia,'Times New Roman',serif" font-size="13" fill="#ffb74d" text-anchor="middle" opacity="0.7">Premio Nobel de Medicina · 1904</text>

  <text x="510" y="415" font-family="Georgia,'Times New Roman',serif" font-size="11" fill="#ffd54f" text-anchor="middle" letter-spacing="4" opacity="0.45">SISTEMAS AUTOORGANIZADOS</text>
</svg>
