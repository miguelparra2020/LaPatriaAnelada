<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2b5e"/>
      <stop offset="100%" style="stop-color:#1a4a8a"/>
    </linearGradient>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d2b5e;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#0d2b5e;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative molecular cluster (left side) -->
  <g opacity="0.28" transform="translate(220, 225)">
    <circle cx="0" cy="0" r="22" fill="#4fc3f7"/>
    <circle cx="80" cy="-45" r="13" fill="#81d4fa"/>
    <circle cx="-80" cy="-45" r="13" fill="#81d4fa"/>
    <circle cx="80" cy="45" r="13" fill="#81d4fa"/>
    <circle cx="-80" cy="45" r="13" fill="#81d4fa"/>
    <circle cx="0" cy="-90" r="9" fill="#b3e5fc"/>
    <circle cx="120" cy="0" r="9" fill="#b3e5fc"/>
    <circle cx="-120" cy="0" r="9" fill="#b3e5fc"/>
    <circle cx="0" cy="90" r="9" fill="#b3e5fc"/>
    <line x1="20" y1="-10" x2="67" y2="-37" stroke="#4fc3f7" stroke-width="2.5"/>
    <line x1="-20" y1="-10" x2="-67" y2="-37" stroke="#4fc3f7" stroke-width="2.5"/>
    <line x1="20" y1="10" x2="67" y2="37" stroke="#4fc3f7" stroke-width="2.5"/>
    <line x1="-20" y1="10" x2="-67" y2="37" stroke="#4fc3f7" stroke-width="2.5"/>
    <line x1="0" y1="-22" x2="0" y2="-81" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="0" y1="22" x2="0" y2="81" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="93" y1="-45" x2="111" y2="-8" stroke="#81d4fa" stroke-width="1.5"/>
    <line x1="-93" y1="-45" x2="-111" y2="-8" stroke="#81d4fa" stroke-width="1.5"/>
    <line x1="93" y1="45" x2="111" y2="8" stroke="#81d4fa" stroke-width="1.5"/>
    <line x1="-93" y1="45" x2="-111" y2="8" stroke="#81d4fa" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="105" fill="none" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="5,7" opacity="0.5"/>
    <circle cx="0" cy="0" r="145" fill="none" stroke="#4fc3f7" stroke-width="0.6" stroke-dasharray="2,10" opacity="0.3"/>
  </g>

  <!-- Fade overlay so text area is clean -->
  <rect x="340" y="0" width="460" height="450" fill="url(#fade)"/>

  <!-- Border -->
  <rect x="14" y="14" width="772" height="422" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.5"/>

  <!-- Top label -->
  <text x="510" y="90" font-family="Georgia,'Times New Roman',serif" font-size="13" fill="#81d4fa" text-anchor="middle" letter-spacing="5" opacity="0.85">BIBLIOTECA CIENTÍFICA</text>

  <!-- Title -->
  <text x="510" y="195" font-family="Georgia,'Times New Roman',serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">EL ARTE</text>
  <text x="510" y="255" font-family="Georgia,'Times New Roman',serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">DE LO SOLUBLE</text>

  <!-- Divider -->
  <line x1="360" y1="282" x2="660" y2="282" stroke="#4fc3f7" stroke-width="1.5" opacity="0.7"/>

  <!-- Author -->
  <text x="510" y="318" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#81d4fa" text-anchor="middle">Peter B. Medawar</text>
  <text x="510" y="348" font-family="Georgia,'Times New Roman',serif" font-size="13" fill="#4fc3f7" text-anchor="middle" opacity="0.7">Premio Nobel de Medicina</text>

  <!-- Footer -->
  <text x="510" y="415" font-family="Georgia,'Times New Roman',serif" font-size="11" fill="#4fc3f7" text-anchor="middle" letter-spacing="4" opacity="0.5">SISTEMAS AUTOORGANIZADOS</text>
</svg>
